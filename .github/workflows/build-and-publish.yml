name: Build and Publish EfSec E2E Library

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-source:
    name: Verify Source Authenticity  
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify vodozemac source
        run: |
          echo "Verifying vodozemac comes from official Matrix repository..."
          cd vodozemac
          git remote -v
          git remote -v | grep -q "github.com/matrix-org/vodozemac" || {
            echo "ERROR: vodozemac must be from official Matrix repository"
            exit 1
          }
          echo "✓ vodozemac source verified from Matrix"

  build-wasm:
    name: Build WASM + TypeScript Package
    runs-on: ubuntu-latest
    needs: verify-source
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Setup wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@efchatnet'

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            efsec-wasm/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build WASM module
        run: |
          echo "Building vodozemac (Rust) to WebAssembly..."
          cd efsec-wasm
          wasm-pack build --target web --out-dir pkg
          ls -la pkg/
          echo "✓ WASM build complete"

      - name: Build TypeScript client
        run: |
          echo "Building TypeScript client with WASM bindings..."
          cd client
          npm ci
          npm run build
          ls -la dist/
          echo "✓ TypeScript client build complete"

      - name: Run tests
        run: |
          echo "Running WASM tests..."
          cd efsec-wasm
          wasm-pack test --headless --firefox
          echo "Running TypeScript tests..."
          cd ../client
          npm test

      - name: Package for GitHub Packages
        run: |
          echo "Preparing @efchatnet/efsec package..."
          cd client
          # Update package.json for GitHub Packages
          npm version patch --no-git-tag-version || true
          echo "Package ready for publishing"

      - name: Publish to GitHub Packages (main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          cd client
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (on version tags)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            efsec-wasm/pkg/*.wasm
            efsec-wasm/pkg/*.js
            client/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: efsec-build-artifacts
          path: |
            efsec-wasm/pkg/
            client/dist/
          retention-days: 30

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: verify-source
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Audit Rust dependencies
        uses: actions-rs/audit@v1
        with:
          command: audit
          args: --ignore RUSTSEC-0000-0000

      - name: Audit Node.js dependencies  
        run: |
          cd client
          npm audit --audit-level=moderate